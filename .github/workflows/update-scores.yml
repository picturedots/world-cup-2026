name: Update World Cup Scores

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run score updater
        env:
          FOOTBALLDATA_KEY: ${{ secrets.FOOTBALLDATA_KEY }}
        run: |
          node .github/scripts/update-scores.mjs | tee /tmp/update-scores.log
          echo "SCORE_SUMMARY=$(tail -n 1 /tmp/update-scores.log)" >> "$GITHUB_ENV"

      - name: Commit updated gamestate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gamestate.json data/schedule.json
          git diff --staged --quiet || git commit -m "chore: update scores $(date -u '+%Y-%m-%d %H:%M UTC') - ${SCORE_SUMMARY}"
          git push
