<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World C(hack)UP 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚽</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1 style="white-space:nowrap"><span class="logo-ball">⚽</span>World C(hack)UP 2026</h1>
    <div style="font-size:13px;color:var(--text2);text-align:right;min-width:0;flex-shrink:1;margin-left:12px" id="last-updated-header"></div>
  </div>
  <div id="app"></div>
  <!-- <div style="margin-top:2rem;text-align:right">
    <button class="btn btn-sm btn-danger" onclick="resetDraft()">Reset draft</button>
  </div> -->
  <a href="flags-strip.svg"><img class="flag-divider" src="flags-strip.svg" alt="" title="The 48 nations, sorted by flag color -- click to enlarge"/></a>
</div>

<script>
const REPO_OWNER = 'picturedots';
const REPO_NAME  = 'world-cup-2026';
const BRANCH     = 'main';

const GROUPS = {
  A:['Mexico','South Africa','South Korea','Czechia'],
  B:['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
  C:['Brazil','Morocco','Haiti','Scotland'],
  D:['United States','Paraguay','Australia','Türkiye'],
  E:['Germany','Curaçao','Ivory Coast','Ecuador'],
  F:['Netherlands','Japan','Sweden','Tunisia'],
  G:['Belgium','Egypt','Iran','New Zealand'],
  H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I:['France','Senegal','Iraq','Norway'],
  J:['Argentina','Algeria','Austria','Jordan'],
  K:['Portugal','DR Congo','Uzbekistan','Colombia'],
  L:['England','Croatia','Ghana','Panama']
};

const TEAM_FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czechia':'🇨🇿',
  'Canada':'🇨🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷',
  'Germany':'🇩🇪','Curaçao':'🇨🇼','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'
};
function teamFlag(t) { return TEAM_FLAGS[t] || ''; }

const ALL_TEAMS = [];
const TEAM_GROUP = {};
Object.entries(GROUPS).forEach(([g,ts]) => { ts.forEach(t => { ALL_TEAMS.push(t); TEAM_GROUP[t] = g; }); });

let draft = { locked: false, players: [], draftOrder: [], ownership: {}, draftComplete: false };
let gamestate = { points: {}, ownership: {}, matchLog: [], bonusesAwarded: {}, processedMatchIds: [], lastUpdated: null };
let schedule = { matches: [], lastUpdated: null };
let tab = 'scores';
let scheduleFilterOpen = false;
let scheduleFilterCountry = null;
let logFilterOpen = false;
let logFilterCountry = null;
let pat = localStorage.getItem('fifa26_pat') || '';

// --- GitHub API helpers ---

async function ghFetch(path, options = {}) {
  const authHeaders = pat ? { 'Authorization': `Bearer ${pat}` } : {};
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${path}`, {
    ...options,
    headers: {
      ...authHeaders,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API error ${res.status}`);
  }
  return res.json();
}

async function loadData() {
  try {
    const [d, g] = await Promise.all([getFile('data/draft.json'), getFile('data/gamestate.json')]);
    draft = d.content; draft._sha = d.sha;
    gamestate = g.content; gamestate._sha = g.sha;
  } catch(e) {
    showMsg('app-msg', 'Could not load game data. Check your PAT and repo settings.', 'danger');
  }
  // Schedule is optional — it may not exist before the first updater run.
  try {
    const s = await getFile('data/schedule.json');
    schedule = s.content;
  } catch(e) {
    schedule = { matches: [], lastUpdated: null };
  }
}

// --- Draft helpers ---

function getPlayerTeams(pid) { return ALL_TEAMS.filter(t => (draft.ownership[t] === pid)); }
function getPlayerGroups(pid) { return new Set(getPlayerTeams(pid).map(t => TEAM_GROUP[t])); }
function canPick(pid, team) {
  const myG = getPlayerGroups(pid);
  const tG = TEAM_GROUP[team];
  if (!myG.has(tG)) return true;
  const rem = ALL_TEAMS.filter(t => !draft.ownership[t]);
  const otherG = new Set(rem.map(t => TEAM_GROUP[t]));
  otherG.delete(tG);
  return otherG.size === 0;
}
function playerName(pid) { return draft.players.find(p => p.id === pid)?.name || pid; }
function effectiveOwnership() {
  return Object.keys(gamestate.ownership).length > 0 ? gamestate.ownership : draft.ownership;
}
function isEliminated(team) { return (gamestate.eliminated || []).includes(team); }

// --- Render ---

function render() {
  const a = document.getElementById('app');
  if (draft.draftComplete) { renderTournament(a); }
  else if (!pat) { renderPATSetup(a); return; }
  else renderDraft(a);
  // else renderTournament(a);

  const lu = gamestate.lastUpdated ? new Date(gamestate.lastUpdated).toLocaleString() : 'Never';
  document.getElementById('last-updated-header').textContent = `Updated: ${lu}`;
}

function renderPATSetup(a) {
  a.innerHTML = `
    <div class="card">
      <h2>GitHub setup</h2>
      <p style="font-size:14px;color:var(--text2);margin-bottom:1rem">Enter a GitHub Personal Access Token with <strong>repo</strong> write access. This is stored only in your browser.</p>
      <div class="section-label">Personal Access Token</div>
      <input type="text" id="pat-input" placeholder="ghp_..." value="${pat}" />
      <button class="btn btn-primary" onclick="savePAT()">Save and load game</button>
    </div>
    <div class="notice notice-info" style="font-size:13px">
      To create a token: GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token → select <strong>repo</strong> scope.
    </div>`;
}

function savePAT() {
  pat = document.getElementById('pat-input').value.trim();
  localStorage.setItem('fifa26_pat', pat);
  init();
}

function renderDraft(a) {
  const totalPicks = draft.players.length * 6;
  const done = draft.draftIndex >= totalPicks || draft.draftComplete;
  const idx = draft.draftIndex || 0;
  const currentPid = done ? null : draft.draftOrder[idx % draft.draftOrder.length];
  const round = Math.floor(idx / draft.players.length) + 1;

  let html = ``;

  if (draft.locked && !draft.draftComplete) {
    html += `<div class="lock-banner">Draft is being saved...</div>`;
  }

  const draftTabActive = tab === 'draft' || tab === 'scores';
  html += `<div class="tab-bar">
    <button class="tab ${draftTabActive ? 'active' : ''}" onclick="setTab('draft')">Draft board</button>
    <button class="tab ${tab === 'rosters' ? 'active' : ''}" onclick="setTab('rosters')">Rosters</button>
    <button class="tab ${tab === 'setup' ? 'active' : ''}" onclick="setTab('setup')">Players</button>
  </div>`;

  if (tab === 'setup') {
    html += renderPlayerSetup();
  } else if (tab === 'rosters') {
    html += renderRosters();
  } else {
    if (!done) {
      html += `<div class="notice notice-info">⚽ Round ${round} &middot; Pick ${idx + 1} of ${totalPicks} — <strong>${playerName(currentPid)}</strong>'s turn</div>`;
      html += `<div class="grid">`;
      Object.entries(GROUPS).forEach(([g, teams]) => {
        html += `<div class="card group-card" style="padding:10px 12px"><div class="group-label">Group ${g}</div>`;
        teams.forEach(t => {
          const taken = draft.ownership[t] !== undefined;
          const allowed = !taken && canPick(currentPid, t);
          const owner = taken ? playerName(draft.ownership[t]) : '';
          html += `<button class="team-btn" ${taken || !allowed ? 'disabled' : ''} onclick="pickTeam('${t}','${currentPid}')"
            title="${taken ? 'Owned by ' + owner : (!allowed ? 'You already have a team in Group ' + g : '')}">
            ${t}${taken ? ` <span style="font-size:11px;opacity:0.6">(${owner})</span>` : ''}
          </button>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="notice notice-success">🎉 All picks in! Lock the draft to kick off the tournament — standings update every 4 hours via GitHub Actions.</div>`;
      html += `<button class="btn btn-primary" onclick="completeDraft()">⚽ Kick off the tournament!</button>`;
    }
  }

  a.innerHTML = html;
}

function renderPlayerSetup() {
  if (draft.draftIndex > 0) {
    return `<div class="notice notice-warn">Draft is in progress. Cannot change player list.</div>` + renderRosters();
  }
  let html = `<div class="card"><h2>Add players</h2>
    <div id="player-list" style="margin-bottom:12px">` +
    draft.players.map((p,i) => `<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:0.5px solid var(--border)">
      <span style="font-size:14px">${p.name}</span>
      <button class="btn btn-sm" onclick="removePlayer(${i})">Remove</button>
    </div>`).join('') +
    `</div>
    <input type="text" id="pname" placeholder="Player name..." />
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="addPlayer()">Add player</button>
      ${draft.players.length >= 2 ? `<button class="btn" onclick="randomOrder()">Randomize order</button>` : ''}
    </div>
  </div>`;

  if (draft.draftOrder.length) {
    html += `<div class="card"><h3>Draft order</h3>` +
      draft.draftOrder.map((pid,i) => `<div style="padding:4px 0;font-size:14px"><span style="color:var(--text3);margin-right:8px">${i+1}.</span>${playerName(pid)}</div>`).join('') +
      `${draft.players.length >= 2 ? `<button class="btn btn-primary" style="margin-top:12px" onclick="startDraft()">Start draft</button>` : ''}
    </div>`;
  }

  html += `<div id="app-msg"></div>`;
  return html;
}

function renderRosters() {
  const order = draft.draftOrder.length ? draft.draftOrder : draft.players.map(p => p.id);
  return order.map((pid, i) => {
    const teams = getPlayerTeams(pid);
    const isCur = !draft.draftComplete && draft.draftOrder[draft.draftIndex % draft.draftOrder.length] === pid;
    return `<div class="player-card${isCur ? ' active' : ''}">
      <div style="font-weight:600;font-size:14px">${i+1}. ${playerName(pid)} <span style="font-size:12px;font-weight:400;color:var(--text2)">(${teams.length}/6)</span></div>
      <div style="margin-top:6px">${teams.length ? teams.map(t => `<span class="tag"><span style="font-size:1.25em;vertical-align:-0.12em">${teamFlag(t)}</span> ${t}</span>`).join('') : '<span style="font-size:12px;color:var(--text3)">No picks yet</span>'}</div>
    </div>`;
  }).join('');
}

function renderTournament(a) {
  console.log("rendering Tournament...");
  let html = `<div class="tab-bar">
    <button class="tab ${tab==='scores'?'active':''}" onclick="setTab('scores')">Standings</button>
    <button class="tab ${tab==='rosters'?'active':''}" onclick="setTab('rosters')">Rosters</button>
    <button class="tab ${tab==='log'?'active':''}" onclick="setTab('log')">Log</button>
    <button class="tab ${tab==='schedule'?'active':''}" onclick="setTab('schedule')">Schedule</button>
  </div>`;

  if (tab === 'scores') html += renderStandings();
  else if (tab === 'rosters') html += renderTournamentRosters();
  else if (tab === 'log') html += renderLog();
  else if (tab === 'schedule') html += renderSchedule();

  a.innerHTML = html;
}

function renderStandings() {
  const own = effectiveOwnership();
  console.log("standings..");
  console.log(own);
  const sorted = draft.players.slice().sort((a,b) => (gamestate.points[b.id]||0) - (gamestate.points[a.id]||0));
  let html = `<div class="notice" style="font-size:12px">Standings update automatically every 4 hours (or so) via GitHub Actions. Refresh to see the latest.</div>`;
  html += `<details style="margin-bottom:1rem">
    <summary style="cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);user-select:none">Points guide</summary>
    <div class="card" style="margin-top:0.5rem;font-size:13px">
      <table style="width:100%;border-collapse:collapse">
        <tbody>
          <tr><td style="padding:4px 0;color:var(--text2)">Win</td><td style="text-align:right;font-weight:600">3</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Draw <span style="font-weight:400;font-size:11px">(+ teams swap owners)</span></td><td style="text-align:right;font-weight:600">1</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Round of 32 — group winner</td><td style="text-align:right;font-weight:600">7</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Round of 32 — 2nd place</td><td style="text-align:right;font-weight:600">5</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Round of 32 — 3rd place</td><td style="text-align:right;font-weight:600">3</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Round of 16</td><td style="text-align:right;font-weight:600">4</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Round of 8</td><td style="text-align:right;font-weight:600">5</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Semis</td><td style="text-align:right;font-weight:600">6</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Advance to Final</td><td style="text-align:right;font-weight:600">7</td></tr>
          <tr><td style="padding:4px 0;color:var(--text2)">Champion</td><td style="text-align:right;font-weight:600">8</td></tr>
        </tbody>
      </table>
    </div>
  </details>`;
  let rank = 0;
  let prevPts = null;
  sorted.forEach((p, i) => {
    const pts = gamestate.points[p.id] || 0;
    if (pts !== prevPts) { rank = i + 1; prevPts = pts; }
    const teams = ALL_TEAMS.filter(t => own[t] === p.id).sort((a, b) => a.localeCompare(b));
    const rankIcon = rank === 1 ? '🏆' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}`;
    const rankStyle = rank <= 3 ? 'font-size:18px;width:28px;text-align:center' : 'font-size:14px;font-weight:700;width:28px;text-align:center;color:var(--text3)';
    html += `<div class="score-row${rank===1?' gold':''}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="${rankStyle}">${rankIcon}</span>
        <div>
          <div style="font-weight:600;font-size:15px">${p.name}</div>
          <div style="font-size:14px;opacity:0.65;margin-top:2px">${teams.map(t=>`<span class="${isEliminated(t)?'team-out':''}" style="margin-right:4px;display:inline-block;">${t}</span>`).join('')}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:700">${pts}</div>
        <div style="font-size:11px;opacity:0.6">pts</div>
      </div>
    </div>`;
  });
  html += `<p style="text-align:center;margin-top:1.5rem">
    <a href="scores-chart.html">📈 Charts</a>
  </p>`;
  return html;
}

function renderTournamentRosters() {
  const own = effectiveOwnership();
  return draft.players.map((p, i) => {
    const teams = ALL_TEAMS.filter(t => own[t] === p.id).sort((a, b) => a.localeCompare(b));
    const pts = gamestate.points[p.id] || 0;
    return `<div class="player-card">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="font-weight:600;font-size:14px">${i+1}. ${p.name}</div>
        <div style="font-size:16px;font-weight:700">${pts} pts</div>
      </div>
      <div style="margin-top:6px">${teams.map(t => `<span class="tag"><span style="font-size:1.25em;vertical-align:-0.12em">${teamFlag(t)}</span> ${t}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

function renderLog() {
  if (!gamestate.matchLog?.length) return `<div class="notice">No matches logged yet.</div>`;
  let html = renderCountryFilter('log');
  const entries = [...gamestate.matchLog].reverse().filter(e =>
    !logFilterCountry || (e.msg || '').includes(logFilterCountry)
  );
  if (!entries.length) {
    return html + `<div class="notice">No logged matches for ${logFilterCountry}.</div>`;
  }
  return html + entries.map(e =>
    `<div class="score-row" style="font-size:13px">
      <span>${e.msg}</span>
      <span style="font-size:11px;color:var(--text3);white-space:nowrap;margin-left:8px">${new Date(e.time).toLocaleDateString()}</span>
    </div>`
  ).join('');
}

function renderSchedule() {
  const allMatches = schedule.matches || [];
  if (!allMatches.length) return `<div class="notice">No upcoming matches scheduled.</div>`;
  const own = effectiveOwnership();
  const stageLabel = {
    GROUP_STAGE: '', LAST_32: 'Round of 32', LAST_16: 'Round of 16',
    QUARTER_FINALS: 'Quarter-final', SEMI_FINALS: 'Semi-final',
    THIRD_PLACE: 'Third place', FINAL: 'Final'
  };
  const teamCell = (name) => {
    if (!name) return `<span style="color:var(--text3)">TBD</span>`;
    const owner = own[name] ? playerName(own[name]) : null;
    return `${name}${owner ? ` <span style="font-size:11px;opacity:0.6">(${owner})</span>` : ''}`;
  };

  let html = `<div class="notice" style="font-size:12px">Upcoming matches shown in your local time. Completed games are not listed.</div>`;
  html += renderCountryFilter('schedule');

  const matches = scheduleFilterCountry
    ? allMatches.filter(m => m.home === scheduleFilterCountry || m.away === scheduleFilterCountry)
    : allMatches;

  if (!matches.length) {
    return html + `<div class="notice">No upcoming matches for ${scheduleFilterCountry}.</div>`;
  }

  let lastDay = null;
  matches.forEach(m => {
    const d = new Date(m.utcDate);
    const dayKey = d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
    if (dayKey !== lastDay) {
      html += `<div class="section-label" style="margin-top:14px">${dayKey}</div>`;
      lastDay = dayKey;
    }
    const time = d.toLocaleTimeString(undefined, { hour:'numeric', minute:'2-digit' });
    const label = stageLabel[m.stage] || (m.group ? m.group.replace('GROUP_', 'Group ') : '');
    html += `<div class="score-row" style="font-size:16px">
      <div>
        <div>${teamCell(m.home)} <span style="color:var(--text3)">vs</span> ${teamCell(m.away)}${m.city ? ` <span style="color:var(--text3)">at</span> ${m.city}` : ''}</div>
        ${label ? `<div style="margin-top:3px"><span class="tag">${label}</span></div>` : ''}
      </div>
      <span style="font-size:16px;color:var(--text2);white-space:nowrap;margin-left:8px">${time}</span>
    </div>`;
  });
  return html;
}

function renderCountryFilter(kind) {
  const open = kind === 'log' ? logFilterOpen : scheduleFilterOpen;
  const selected = kind === 'log' ? logFilterCountry : scheduleFilterCountry;
  let html = `<div class="card" style="padding:10px 12px">
    <button class="btn btn-sm" style="width:100%;display:flex;align-items:center;justify-content:space-between" onclick="toggleCountryFilter('${kind}')">
      <span>Filter by country${selected ? `: <strong>${teamFlag(selected)} ${selected}</strong>` : ''}</span>
      <span style="color:var(--text3)">${open ? '▲' : '▼'}</span>
    </button>`;
  if (open) {
    html += `<div style="margin-top:10px">
      <button class="team-btn${!selected ? ' selected' : ''}" onclick="setCountryFilter('${kind}',null)">All countries</button>
      <div class="country-filter-grid">` +
      [...ALL_TEAMS].sort((a, b) => a.localeCompare(b)).map(t =>
        `<button class="team-btn${t === selected ? ' selected' : ''}" onclick="setCountryFilter('${kind}','${t.replace(/'/g, "\\'")}')">
          <span style="font-size:1.25em;vertical-align:-0.12em">${teamFlag(t)}</span> ${t}
        </button>`
      ).join('') +
      `</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function toggleCountryFilter(kind) {
  if (kind === 'log') logFilterOpen = !logFilterOpen;
  else scheduleFilterOpen = !scheduleFilterOpen;
  render();
}

function setCountryFilter(kind, country) {
  if (kind === 'log') logFilterCountry = country;
  else scheduleFilterCountry = country;
  render();
}

function showMsg(id, msg, type='') {
  const el = document.getElementById(id);
  if (el) el.innerHTML = `<div class="notice${type?' notice-'+type:''}" style="margin-top:8px">${msg}</div>`;
}

function setTab(t) { tab = t; render(); }

// --- Draft actions ---

async function addPlayer() {
  const inp = document.getElementById('pname');
  const name = inp?.value.trim();
  if (!name || draft.players.length >= 8) return;
  const player = { id: 'p' + Date.now(), name };
  draft.players.push(player);
  draft.draftOrder.push(player.id);
  inp.value = '';
  await saveDraft('Add player: ' + name);
  render();
}

async function removePlayer(i) {
  const removed = draft.players.splice(i, 1)[0];
  draft.draftOrder = draft.draftOrder.filter(id => id !== removed.id);
  await saveDraft('Remove player');
  render();
}

async function randomOrder() {
  const ids = draft.players.map(p => p.id);
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  draft.draftOrder = ids;
  draft.draftIndex = 0;
  draft.players.forEach(p => { gamestate.points[p.id] = 0; });
  await saveDraft('Set draft order');
  render();
}

function startDraft() {
  draft.draftIndex = 0;
  tab = 'draft';
  render();
}

async function pickTeam(team, pid) {
  draft.ownership[team] = pid;
  draft.draftIndex = (draft.draftIndex || 0) + 1;
  const totalPicks = draft.players.length * 6;
  if (draft.draftIndex >= totalPicks) {
    // auto-prompt to lock
  }
  await saveDraft(`Pick: ${playerName(pid)} selected ${team}`);
  render();
}

async function completeDraft() {
  draft.draftComplete = true;
  draft.locked = true;
  // Seed gamestate ownership from draft
  gamestate.ownership = { ...draft.ownership };
  draft.players.forEach(p => { gamestate.points[p.id] = 0; });
  await saveDraft('Draft complete — locked');
  await saveGamestate('Seed initial gamestate from draft');
  tab = 'scores';
  render();
}

async function resetDraft() {
  if (!confirm('Reset the draft? This clears all picks and cannot be undone.')) return;
  draft = { locked: false, players: [], draftOrder: [], ownership: {}, draftComplete: false, draftIndex: 0 };
  gamestate = { points: {}, ownership: {}, matchLog: [], bonusesAwarded: {}, processedMatchIds: [], lastUpdated: null };
  await saveDraft('Reset draft');
  await saveGamestate('Reset gamestate');
  tab = 'draft';
  render();
}

// --- GitHub save helpers ---

async function saveDraft(message) {
  try {
    const { sha } = await getFile('data/draft.json');
    draft._sha = sha;
    const payload = { ...draft };
    delete payload._sha;
    await putFile('data/draft.json', payload, sha, message);
    const refreshed = await getFile('data/draft.json');
    draft._sha = refreshed.sha;
  } catch(e) {
    console.error('Save draft failed:', e);
  }
}

async function saveGamestate(message) {
  try {
    const { sha } = await getFile('data/gamestate.json');
    gamestate._sha = sha;
    const payload = { ...gamestate };
    delete payload._sha;
    await putFile('data/gamestate.json', payload, sha, message);
    const refreshed = await getFile('data/gamestate.json');
    gamestate._sha = refreshed.sha;
  } catch(e) {
    console.error('Save gamestate failed:', e);
  }
}

async function getFile(path) {
  const authHeaders = pat ? { 'Authorization': `Bearer ${pat}` } : {};
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}?ref=${BRANCH}&t=${Date.now()}`, {
    headers: {
      ...authHeaders,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    }
  });
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const data = await res.json();
  const binary = atob(data.content.replace(/\n/g,''));
  const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
  return { content: JSON.parse(new TextDecoder().decode(bytes)), sha: data.sha };
}

async function putFile(path, content, sha, message) {
  const jsonStr = JSON.stringify(content, null, 2);
  const utf8Bytes = new TextEncoder().encode(jsonStr);
  let binaryStr = '';
  for (const b of utf8Bytes) binaryStr += String.fromCharCode(b);
  const encoded = btoa(binaryStr);
  const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': `Bearer ${pat}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify({ message, content: encoded, sha, branch: BRANCH })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `GitHub PUT error ${res.status}`);
  }
}

async function init() {
  document.getElementById('app').innerHTML = `<div class="notice"><span class="loading-ball">⚽</span> Loading game data...</div>`;
  await loadData();
  tab = draft.draftComplete ? 'scores' : 'setup';
  render();
}

init();
